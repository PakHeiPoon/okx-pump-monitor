name: OKX Realtime Scanner (flush_reversal)

# V2.10：高频 monitor 专用 workflow，5min 粒度跑 FlushReversalMonitor。
# V2.19：state-realtime.json 改走 GH Actions cache，不再 commit 回 main。
#         这样 Vercel 永远不会被 cron commit 触发 deployment（即便 ignore
#         build step 会 cancel，cancelled deploy 仍占 Hobby 100/day 配额）。

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: scan-realtime
  cancel-in-progress: false

jobs:
  scan-realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # V2.19：state-realtime.json 从 GH Actions cache 恢复
      - name: Restore realtime state
        uses: actions/cache/restore@v4
        with:
          path: state-realtime.json
          key: scanner-state-realtime-${{ github.run_id }}
          restore-keys: |
            scanner-state-realtime-

      - name: Run realtime scanner
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FLUSH_LOOKBACK_MIN: '30'
          FLUSH_MIN_DROP_PCT: '8.0'
          FLUSH_PEAK_TROUGH_MAX_MIN: '15'
          FLUSH_MIN_RECOVERY_PCT: '30.0'
          FLUSH_VOL_MULTIPLIER: '3.0'
          FLUSH_REQUIRE_24H_GAINER_PCT: '5.0'
          FLUSH_TOP_N: '60'
          # V2.22: SlowFlushReversal —— 抓 30min-4h 的慢洗 V 反弹（ALLO 6/7 那种）
          SLOW_FLUSH_LOOKBACK_BARS: '96'
          SLOW_FLUSH_MIN_DROP_PCT: '25.0'
          SLOW_FLUSH_PEAK_TROUGH_MIN_BARS: '6'
          SLOW_FLUSH_PEAK_TROUGH_MAX_BARS: '60'
          SLOW_FLUSH_MIN_BASE_BARS: '6'
          SLOW_FLUSH_MIN_RECOVERY_PCT: '20.0'
          SLOW_FLUSH_MAX_RECOVERY_PCT: '60.0'
          SLOW_FLUSH_VOL_MULTIPLIER: '1.2'
          SLOW_FLUSH_REQUIRE_24H_GAINER_PCT: '20.0'
          SLOW_FLUSH_TOP_N: '40'
        run: python -m scanner.realtime

      - name: Save realtime state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state-realtime.json
          key: scanner-state-realtime-${{ github.run_id }}
