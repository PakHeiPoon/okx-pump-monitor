name: OKX Pump Scanner

on:
  schedule:
    # 每15分钟跑一次（cron语法是UTC时间，但*/15对所有时区一样）
    - cron: '*/15 * * * *'
  workflow_dispatch:   # 允许手动触发测试

# 防止上一次没跑完时新一轮又启动
concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write   # 需要写state.json回仓库
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          # 可选：也可以直接改这里调阈值
          TOP_N: '50'
          PUMP_THRESHOLD: '3.0'
          DUMP_THRESHOLD: '5.0'
          MIN_VOL_USDT: '50000'
          LOOKBACK_BARS: '16'
        run: python scan.py

      - name: Persist state
        run: |
          if [[ -n $(git status -s state.json) ]]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi
